services:
  wisebox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wisebox
    restart: unless-stopped
    ports:
      - "${WISEBOX_PORT:-8000}:8000"
    environment:
      PORT: 8000
      SECRET_KEY: ${SECRET_KEY:-wisebox-production}
      GENERATED_DIR: /app/static/generated
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - wisebox_generated:/app/static/generated
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  wisebox_generated:
